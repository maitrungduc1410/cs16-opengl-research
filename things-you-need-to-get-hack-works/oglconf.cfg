aim 1
//aim_smooth: 0=instant snap, 1..10 = progressively smoother (higher = slower follow)
aim_smooth 3
//aim_dot: draw a dot at the exact point the aimbot aims at
aim_dot 1
//aim_point: vertical aim offset from head center (world units; positive=higher, 0=center of head)
aim_point 0
//trigger: triggerbot - auto-fire when the crosshair rests on an enemy
trigger 0
//trigger_delay: reaction delay in ms before the triggerbot fires (humanize)
trigger_delay 80
//autofire: auto-pistol/auto-knife - spam clicks while mouse1 is held
autofire 0
//autofire_rate: ms between auto-fire clicks (lower = faster)
autofire_rate 60
//notify: toast popups when toggling features in the menu
notify 1
//esp_log: on-screen per-frame enemy/PVS detection counters
esp_log 0
aimthru 1
target 0
recoil 2
norecoil 0
esp_engine 1
esp_name 1
//esp_name_pad: vertical offset for player name above the box (px; positive=higher, negative=closer)
esp_name_pad 0
//esp_name_size: player name font size (1=small/7px  2=normal/10px  3=large/13px  4=x-large/16px)
esp_name_size 2
esp_box 1
//esp_box_pad: box padding around the player (negative=tighter)
esp_box_pad 0
//esp_box_radius: box corner radius (0=sharp corners)
esp_box_radius 0
//esp_box_width: box stroke thickness in px (scaled by resolution)
esp_box_width 2
esp_dist 1
//esp_dist_pad: vertical offset for distance text below the box (px; positive=lower, negative=closer)
esp_dist_pad 0
//esp_dist_size: distance font size (1=small/7px  2=normal/10px  3=large/13px  4=x-large/16px)
esp_dist_size 2
//esp_snap: snapline to each enemy. 0=off, 1=screen bottom, 2=screen top, 3=crosshair
esp_snap 0
//esp_vischeck: dim ESP when enemy is occluded (depth-buffer test)
esp_vischeck 1
//esp_arrow: edge-of-screen arrow pointing at enemies outside the viewport
esp_arrow 1
//esp_maxdist: hide ESP for enemies farther than this (meters); 0 = unlimited
esp_maxdist 0
//esp_fade: fade ESP alpha by distance (closer = full, farther = translucent)
esp_fade 0
//esp_team: 0=both 1=CT 2=T
esp_team 0
esp_dbg 1
esp_hud 1
hud_hp 1
hud_ammo 1
hud_die 0
chams 1
chams_wire 0
radar 1
//radar_x / radar_y: radar center position (pre-scale units; move it in-game via "Move radar")
radar_x 84
radar_y 84
//radar_shape: 0=circle 1=square
radar_shape 0
//radar_size: radar disc radius in pre-scale units (30..150); smaller = smaller radar
radar_size 70
//radar_zoom: world units that map to the outer ring (smaller = closer view); typical 1500
radar_zoom 1500
//radar_rotate: 1 = rotate with view yaw, 0 = fixed north-up
radar_rotate 1
//radar_names: 1 = draw a short name next to each dot
radar_names 0
//radar_rings: 1 = draw two concentric range rings inside the radar
radar_rings 1
//hud_pad: arc distance from crosshair (negative=closer, positive=farther)
hud_pad 0
lambert 1
crosshair 1
fov 200
wall 1
noflash 1
flashmessage 1
nosmoke 1
nosky 0
scope 0
menu_x 40
menu_y 50
check_x 40
check_y 40
//menu_vis_rows: rows visible at once in the hack menu before scrolling (4..55)
menu_vis_rows 20